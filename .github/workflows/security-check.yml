name: Security & Quality Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run security audit (production dependencies)
        run: npm run security:audit
        continue-on-error: false

      - name: Check for outdated packages
        run: npm outdated --registry=https://registry.npmjs.org/ || true

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run tests
        run: npm test

  build:
    name: Build Check
    runs-on: macos-latest
    needs: [security-audit, lint-and-typecheck, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Rebuild native modules
        run: npm run postinstall

      - name: Build application
        run: npm run build

      - name: Package application (dry run)
        run: npm run package:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
